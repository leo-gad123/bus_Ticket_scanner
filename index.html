<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            width: 300px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 5px;
        }
        button:hover {
            background: #218838;
        }
        #qrcode {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Bus Ticket QR Code Generator</h2>
    <p>Enter ticket information:</p>
    <input type="text" id="text-input" value="TICKET-001" placeholder="Enter ticket ID or URL...">
    <div id="qrcode"></div>
    <button onclick="downloadQR()">Download QR Code</button>
</div>

<script>
    const input = document.getElementById("text-input");
    const qrDiv = document.getElementById("qrcode");
    
    let qrcode = new QRCode(qrDiv, {
        text: input.value,
        width: 300,
        height: 300,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    
    input.addEventListener("input", (e) => {
        qrDiv.innerHTML = "";
        qrcode = new QRCode(qrDiv, {
            text: e.target.value || "TICKET-001",
            width: 300,
            height: 300,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    });
    
    function downloadQR() {
        const canvas = qrDiv.querySelector("canvas");
        
        if (canvas) {
            const dataURL = canvas.toDataURL("image/png");
            const link = document.createElement("a");
            link.href = dataURL;
            link.download = "bus_ticket_qr.png";
            link.click();
        } else {
            alert("QR code not ready!");
        }
    }
</script>
</body>
</html>
